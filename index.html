<style>
  :root { --ink:#1A1726; --inkSoft:#241F33; --paper:#FBFAF8; --muted:#8A8597; --coral:#FF5C49; --amber:#FFC24B; --line:rgba(255,255,255,0.08); --lineLight:#ECE8E1; }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { margin:0; padding:0; background:var(--ink); color:var(--paper); font-family:Inter,system-ui,sans-serif; }
  #root { min-height:100vh; }
  input,textarea,button,select { font-family:inherit; }
  ::placeholder { color:var(--muted); }
  *:focus-visible { outline:2px solid var(--amber); outline-offset:2px; }
  .wrap { width:100%; max-width:440px; margin:0 auto; min-height:100vh; padding-top:env(safe-area-inset-top); padding-left:env(safe-area-inset-left); padding-right:env(safe-area-inset-right); padding-bottom:env(safe-area-inset-bottom); box-sizing:border-box; }
  .card { background:var(--ink); min-height:100vh; }
  .btn { border:none; border-radius:12px; font-weight:700; font-size:15px; cursor:pointer; padding:14px; width:100%; }
  .btn-coral { background:var(--coral); color:#fff; }
  .btn-ghost { background:transparent; color:var(--muted); border:1px solid var(--line); }
  .btn-dark { background:var(--ink); color:#fff; }
  .chip { display:inline-flex; align-items:center; gap:6px; padding:7px 13px; border-radius:999px; cursor:pointer; font-weight:600; font-size:13px; border:1.5px solid var(--line); background:transparent; color:var(--muted); white-space:nowrap; }
  .field { width:100%; background:var(--inkSoft); color:var(--paper); border:1px solid var(--line); border-radius:12px; padding:13px 15px; font-size:16px; }
  .h1 { font-family:'Bricolage Grotesque'; font-weight:800; }
  .row { display:flex; gap:8px; }
  .scroll { display:flex; gap:7px; overflow-x:auto; padding-bottom:4px; }
  .modal-bg { position:fixed; inset:0; background:rgba(10,8,16,0.72); display:flex; align-items:center; justify-content:center; padding:18px; z-index:30; }
  .modal { background:var(--paper); color:var(--ink); border-radius:20px; padding:22px; width:100%; max-width:360px; max-height:86vh; overflow-y:auto; }
  .lbtn { background:none; border:none; color:var(--amber); font-weight:600; font-size:13px; cursor:pointer; padding:0; }
  @keyframes developIn { 0%{filter:blur(14px) brightness(1.6);opacity:0;transform:scale(1.04);} 60%{filter:blur(3px);opacity:1;} 100%{filter:blur(0);opacity:1;transform:scale(1);} }
  @keyframes breathe { 0%,100%{transform:scale(1);opacity:1;} 50%{transform:scale(1.5);opacity:.35;} }
  @keyframes rise { from{opacity:0;transform:translateY(10px);} to{opacity:1;transform:translateY(0);} }
  .develop { animation:developIn 1.1s cubic-bezier(.2,.7,.2,1) both; }
  .rise { animation:rise .4s ease both; }
  .photo { position:relative; width:100%; aspect-ratio:3/4; background:linear-gradient(135deg,var(--inkSoft),var(--ink)); border-radius:14px; overflow:hidden; }
  .photo img { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; }
  .spin { width:20px; height:20px; border:2.5px solid rgba(255,255,255,.3); border-top-color:#fff; border-radius:50%; animation:sp .8s linear infinite; display:inline-block; }
  @keyframes sp { to { transform:rotate(360deg); } }
</style>
</head>
<body>
<div id="root" style="padding:24px;color:#8A8597;font-family:-apple-system,system-ui,sans-serif">Loading Candid…</div>
<script>
  function showErr(msg){ var r=document.getElementById('root'); if(r){ r.innerHTML='<div style="padding:24px;font-family:monospace;font-size:13px;line-height:1.5;color:#FF5C49;white-space:pre-wrap">App error:\n'+msg+'</div>'; } }
  window.addEventListener('error', function(e){ showErr((e.message||e)+'\n'+(e.filename||'')+' : '+(e.lineno||'')); });
  window.addEventListener('unhandledrejection', function(e){ showErr('Promise: '+(e.reason && e.reason.message ? e.reason.message : e.reason)); });
</script>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef } = React;

// ---- connection (publishable key is safe to expose; data is protected by RLS) ----
const SB_URL = "https://jfansqgqwgbytrhwptph.supabase.co";
const SB_KEY = "sb_publishable_2OIvtzLqgvnIVodSQTYXKQ_f0xGHn1L";
const sb = window.supabase.createClient(SB_URL, SB_KEY);

const COLORS = ["#FF5C49","#FFC24B","#5FD0A6","#6C8CFF","#C57BFF","#FF8FB1"];
const LS = {
  name: () => localStorage.getItem("candid_name") || "",
  setName: (v) => localStorage.setItem("candid_name", v),
  tokens: () => { try { return JSON.parse(localStorage.getItem("candid_tokens")||"[]"); } catch { return []; } },
  addToken: (t) => { const s = new Set(LS.tokens()); s.add(t); localStorage.setItem("candid_tokens", JSON.stringify([...s])); },
};
const thumbOf = (p) => p.replace(/\.jpg$/, "_thumb.jpg");

// ---- image processing: resize + JPEG (strips EXIF/location, converts HEIC on iOS) ----
function loadImg(src){ return new Promise((res,rej)=>{ const i=new Image(); i.onload=()=>res(i); i.onerror=rej; i.src=src; }); }
function readURL(file){ return new Promise((res,rej)=>{ const r=new FileReader(); r.onload=()=>res(r.result); r.onerror=rej; r.readAsDataURL(file); }); }
function toJpeg(img, maxDim, q){
  return new Promise((res)=>{
    let { width:w, height:h } = img;
    if (Math.max(w,h) > maxDim){ const s = maxDim/Math.max(w,h); w=Math.round(w*s); h=Math.round(h*s); }
    const c = document.createElement("canvas"); c.width=w; c.height=h;
    c.getContext("2d").drawImage(img,0,0,w,h);
    c.toBlob((b)=>res(b), "image/jpeg", q);
  });
}
async function processImage(file){
  const img = await loadImg(await readURL(file));
  const full = await toJpeg(img, 1600, 0.82);
  const thumb = await toJpeg(img, 480, 0.7);
  return { full, thumb };
}

// =================== GUEST ===================
function NameGate({ onDone }){
  const [v,setV]=useState("");
  const ok = v.trim().length>0;
  return (
    <div className="card" style={{padding:"44px 22px", display:"flex", flexDirection:"column", justifyContent:"center", minHeight:"100vh"}}>
      <div style={{fontSize:12,letterSpacing:1.5,textTransform:"uppercase",color:"var(--muted)"}}>Welcome to Candid</div>
      <div className="h1" style={{fontSize:28,marginTop:6,lineHeight:1.12}}>What should we call you?</div>
      <div style={{fontSize:14,color:"var(--muted)",marginTop:10,lineHeight:1.5}}>Your name appears next to the photos you send. You'll only set this once.</div>
      <input className="field" style={{marginTop:24}} value={v} onChange={e=>setV(e.target.value)} placeholder="Your name or nickname"
        onKeyDown={e=>{ if(e.key==="Enter"&&ok){ LS.setName(v.trim()); onDone(v.trim()); } }} />
      <button className="btn btn-coral" style={{marginTop:14, opacity:ok?1:.5}} disabled={!ok}
        onClick={()=>{ LS.setName(v.trim()); onDone(v.trim()); }}>Continue</button>
    </div>
  );
}

function GuestApp({ tokenParam }){
  const [name,setName]=useState(LS.name());
  const [events,setEvents]=useState([]);
  const [picked,setPicked]=useState([]);
  const [file,setFile]=useState(null);
  const [preview,setPreview]=useState(null);
  const [cap,setCap]=useState("");
  const [status,setStatus]=useState("idle"); // idle|uploading|sent|error
  const fileRef=useRef();

  useEffect(()=>{
    if(tokenParam){ LS.addToken(tokenParam); history.replaceState({},"",location.pathname); }
    loadEvents();
  },[]);
  async function loadEvents(){
    const toks = LS.tokens();
    if(!toks.length){ setEvents([]); return; }
    const { data } = await sb.from("events").select("*").in("invite_token", toks).eq("status","live");
    const evs = data||[];
    setEvents(evs);
    setPicked(p => p.length ? p.filter(id=>evs.some(e=>e.id===id)) : (evs[0]?[evs[0].id]:[]));
  }
  function pick(e){ const f=e.target.files?.[0]; if(f){ setFile(f); setPreview(URL.createObjectURL(f)); setStatus("idle"); } }
  function toggle(id){ setPicked(p=> p.includes(id)? p.filter(x=>x!==id) : [...p,id]); }

  async function send(){
    if(!picked.length||!file) return;
    setStatus("uploading");
    try{
      const { full, thumb } = await processImage(file);
      const id = crypto.randomUUID();
      const path = id + ".jpg";
      const up1 = await sb.storage.from("photos").upload(path, full, { contentType:"image/jpeg" });
      if(up1.error) throw up1.error;
      const up2 = await sb.storage.from("photos").upload(thumbOf(path), thumb, { contentType:"image/jpeg" });
      if(up2.error) throw up2.error;
      const ins = await sb.from("photos").insert({ id, caption:cap.trim()||null, guest_name:name, storage_path:path });
      if(ins.error) throw ins.error;
      const rows = picked.map(eid=>({ photo_id:id, event_id:eid }));
      const ins2 = await sb.from("photo_events").insert(rows);
      if(ins2.error) throw ins2.error;
      setStatus("sent"); setFile(null); setPreview(null); setCap("");
      setTimeout(()=>setStatus("idle"), 2400);
    }catch(err){ console.error(err); setStatus("error"); }
  }

  if(!name) return <div className="wrap"><NameGate onDone={setName}/></div>;

  return (
    <div className="wrap"><div className="card" style={{padding:"22px 18px 44px", minHeight:"100vh"}}>
      <div style={{fontSize:12,letterSpacing:1.5,textTransform:"uppercase",color:"var(--muted)"}}>Send a photo</div>
      <div className="h1" style={{fontSize:26,marginTop:2,marginBottom:6}}>Pick where it goes</div>
      <div style={{fontSize:13,color:"var(--muted)",marginBottom:18}}>
        Sending as <b style={{color:"var(--paper)"}}>{name}</b>
        <button className="lbtn" style={{marginLeft:8}} onClick={()=>{ LS.setName(""); setName(""); }}>Change</button>
      </div>

      {events.length===0 ? (
        <div style={{textAlign:"center",padding:"70px 16px",color:"var(--muted)",border:"1.5px dashed var(--line)",borderRadius:18}}>
          No active events right now. Open an invite link from your host to start adding photos.
        </div>
      ) : (<>
        <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:20}}>
          {events.map(e=>{ const a=picked.includes(e.id); return (
            <button key={e.id} className="chip" onClick={()=>toggle(e.id)}
              style={{borderColor:a?e.color:"var(--line)", background:a?e.color+"22":"transparent", color:a?"var(--paper)":"var(--muted)"}}>
              <span style={{width:13,height:13,borderRadius:"50%",border:"2px solid "+(a?e.color:"var(--muted)"),background:a?e.color:"transparent",display:"flex",alignItems:"center",justifyContent:"center"}}>
                {a&&<span style={{color:"#fff",fontSize:8,fontWeight:800}}>✓</span>}</span>
              {e.name}
            </button>); })}
        </div>

        <input ref={fileRef} type="file" accept="image/*" capture="environment" onChange={pick} style={{display:"none"}}/>

        {!preview ? (
          <button className="rise" onClick={()=>fileRef.current?.click()}
            style={{width:"100%",aspectRatio:"3/4",borderRadius:18,border:"1.5px dashed var(--line)",background:"var(--inkSoft)",color:"var(--paper)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:14,cursor:"pointer"}}>
            <div style={{width:64,height:64,borderRadius:"50%",background:"var(--coral)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:26}}>📷</div>
            <div style={{fontSize:16,fontWeight:600}}>Take a photo</div>
            <div style={{fontSize:13,color:"var(--muted)"}}>Opens your camera</div>
          </button>
        ) : (
          <div className="rise">
            <div className="photo"><img src={preview} alt=""/></div>
            <textarea className="field" style={{marginTop:12,resize:"none"}} rows={2} value={cap} onChange={e=>setCap(e.target.value)} placeholder="Add context… where, what, why"/>
            <div className="row" style={{marginTop:12}}>
              <button className="btn btn-ghost" style={{width:"auto",padding:"13px 18px"}} onClick={()=>{ setFile(null); setPreview(null); }}>Retake</button>
              <button className="btn btn-coral" disabled={status==="uploading"||!picked.length} onClick={send} style={{opacity:(status==="uploading"||!picked.length)?.6:1}}>
                {status==="uploading" ? <span className="spin"></span> : `Send to ${picked.length} event${picked.length>1?"s":""}`}
              </button>
            </div>
          </div>
        )}
      </>)}

      {status==="sent" && <div className="rise" style={{marginTop:18,padding:"12px 14px",borderRadius:12,background:"rgba(255,194,75,.12)",color:"var(--amber)",fontWeight:600,fontSize:14,textAlign:"center"}}>Sent. The host has it now.</div>}
      {status==="error" && <div className="rise" style={{marginTop:18,padding:"12px 14px",borderRadius:12,background:"rgba(255,92,73,.14)",color:"var(--coral)",fontWeight:600,fontSize:14,textAlign:"center"}}>Upload failed — check your signal and tap Send again.</div>}

      <div style={{textAlign:"center",marginTop:28}}>
        <a href="/?host=1" className="lbtn" style={{color:"#4A4556",textDecoration:"none"}}>Are you the host? Log in →</a>
      </div>
    </div></div>
  );
}

// =================== HOST ===================
function Login(){
  const [email,setEmail]=useState("");
  const [pw,setPw]=useState("");
  const [err,setErr]=useState("");
  const [busy,setBusy]=useState(false);
  const ok = /\S+@\S+\.\S+/.test(email) && pw.length>=6;
  async function go(){
    setErr(""); setBusy(true);
    const { error } = await sb.auth.signInWithPassword({ email: email.trim(), password: pw });
    setBusy(false);
    if(error) setErr(error.message);
  }
  return (
    <div className="wrap"><div className="card" style={{padding:"44px 22px",display:"flex",flexDirection:"column",justifyContent:"center",minHeight:"100vh"}}>
      <div className="h1" style={{fontSize:34}}>Candid</div>
      <div style={{fontSize:14,color:"var(--muted)",marginTop:8,marginBottom:24}}>Host sign in</div>
      <input className="field" value={email} onChange={e=>setEmail(e.target.value)} placeholder="you@email.com" inputMode="email" autoCapitalize="off" autoComplete="username"/>
      <input className="field" style={{marginTop:10}} type="password" value={pw} onChange={e=>setPw(e.target.value)} placeholder="Password" autoComplete="current-password"
        onKeyDown={e=>{ if(e.key==="Enter"&&ok) go(); }}/>
      <button className="btn btn-coral" style={{marginTop:14,opacity:ok&&!busy?1:.5}} disabled={!ok||busy} onClick={go}>
        {busy ? <span className="spin"></span> : "Sign in"}
      </button>
      {err && <div style={{marginTop:12,color:"var(--coral)",fontSize:13}}>{err}</div>}
    </div></div>
  );
}

function Dashboard({ session, onLogout }){
  const [folders,setFolders]=useState([]);
  const [events,setEvents]=useState([]);
  const [photos,setPhotos]=useState([]);
  const [thumbs,setThumbs]=useState({});
  const [folderFilter,setFolderFilter]=useState("all");
  const [eventFilter,setEventFilter]=useState(null);
  const [panel,setPanel]=useState(null); // 'manage'|'invite'|'hosts'
  const [viewer,setViewer]=useState(null); // {url, photo}
  const [freshId,setFreshId]=useState(null);

  const findEv = (id) => events.find(e=>e.id===id);

  async function loadAll(){
    const [f,e,p] = await Promise.all([
      sb.from("folders").select("*").order("created_at"),
      sb.from("events").select("*").order("created_at"),
      sb.from("photos").select("id,caption,guest_name,storage_path,created_at,photo_events(event_id)").order("created_at",{ascending:false}),
    ]);
    setFolders(f.data||[]); setEvents(e.data||[]);
    const ph = (p.data||[]).map(x=>({ ...x, eventIds:(x.photo_events||[]).map(pe=>pe.event_id) }));
    setPhotos(ph);
    // signed thumbnail urls
    const paths = ph.map(x=>thumbOf(x.storage_path));
    if(paths.length){
      const { data } = await sb.storage.from("photos").createSignedUrls(paths, 3600);
      const map={}; (data||[]).forEach((s,i)=>{ if(s.signedUrl) map[ph[i].id]=s.signedUrl; });
      setThumbs(map);
    }
  }
  useEffect(()=>{ loadAll(); },[]);
  // live updates
  useEffect(()=>{
    const ch = sb.channel("live")
      .on("postgres_changes",{event:"INSERT",schema:"public",table:"photos"},(p)=>{ setFreshId(p.new.id); loadAll(); })
      .on("postgres_changes",{event:"*",schema:"public",table:"photo_events"},()=>loadAll())
      .subscribe();
    return ()=>{ sb.removeChannel(ch); };
  },[]);

  // filtering
  const folderOk = folderFilter==="all"||folderFilter==="unfiled"||folders.some(f=>f.id===folderFilter);
  const ff = folderOk?folderFilter:"all";
  const hasUnfiled = events.some(e=>!e.folder_id);
  const inScope = ff==="all"?events : ff==="unfiled"?events.filter(e=>!e.folder_id) : events.filter(e=>e.folder_id===ff);
  const scopeIds = inScope.map(e=>e.id);
  const evValid = eventFilter && scopeIds.includes(eventFilter);
  const shown = evValid ? photos.filter(p=>p.eventIds.includes(eventFilter))
                        : photos.filter(p=>p.eventIds.some(id=>scopeIds.includes(id)));
  const people = new Set(shown.map(p=>p.guest_name)).size;
  const primary = [{id:"all",name:"All events"}, ...folders.map(f=>({id:f.id,name:f.name})), ...(hasUnfiled?[{id:"unfiled",name:"Unfiled"}]:[])];

  // actions
  async function openPhoto(p){
    const { data } = await sb.storage.from("photos").createSignedUrl(p.storage_path, 3600);
    if(data?.signedUrl) setViewer({ url:data.signedUrl, photo:p });
  }
  async function deletePhoto(p){
    await sb.storage.from("photos").remove([p.storage_path, thumbOf(p.storage_path)]);
    await sb.from("photos").delete().eq("id", p.id);
    setViewer(null); loadAll();
  }

  return (
    <div className="wrap"><div className="card" style={{minHeight:"100vh", position:"relative"}}>
      {/* header */}
      <div style={{padding:"18px 18px 12px", borderBottom:"1px solid var(--line)"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <span style={{position:"relative",width:9,height:9,display:"inline-flex"}}>
              <span style={{position:"absolute",inset:0,borderRadius:"50%",background:"var(--coral)",animation:"breathe 1.8s ease-in-out infinite"}}/>
              <span style={{position:"absolute",inset:0,borderRadius:"50%",background:"var(--coral)"}}/>
            </span>
            <span style={{fontSize:12,letterSpacing:1.5,textTransform:"uppercase",color:"var(--muted)"}}>Live · receiving</span>
          </div>
          <div className="row">
            <button className="chip" onClick={()=>setPanel("hosts")}>Hosts</button>
            <button className="chip" onClick={()=>setPanel("manage")}>Manage</button>
            <button className="chip" onClick={()=>setPanel("invite")}>Invite</button>
          </div>
        </div>
        {/* folders */}
        <div className="scroll" style={{marginTop:14}}>
          {primary.map(p=>{ const a=ff===p.id; return (
            <button key={p.id} className="chip" onClick={()=>{ setFolderFilter(p.id); setEventFilter(null); }}
              style={{borderColor:a?"var(--paper)":"var(--line)",background:a?"var(--paper)":"transparent",color:a?"var(--ink)":"var(--muted)"}}>{p.name}</button>); })}
        </div>
        {/* events within folder */}
        {ff!=="all" && inScope.length>0 && (
          <div className="scroll" style={{marginTop:8}}>
            {inScope.map(e=>{ const a=eventFilter===e.id; return (
              <button key={e.id} className="chip" onClick={()=>setEventFilter(a?null:e.id)}
                style={{borderColor:a?e.color:"var(--line)",background:a?e.color+"22":"transparent",color:a?"var(--paper)":"var(--muted)",opacity:e.status==="ended"&&!a?.6:1}}>
                <span style={{width:7,height:7,borderRadius:"50%",background:e.status==="ended"?"var(--muted)":e.color}}/>{e.name}</button>); })}
          </div>
        )}
        <div style={{display:"flex",gap:20,marginTop:12,marginBottom:12}}>
          <div><b style={{fontSize:16}}>{shown.length}</b> <span style={{color:"var(--muted)",fontSize:13}}>photos</span></div>
          <div><b style={{fontSize:16}}>{people}</b> <span style={{color:"var(--muted)",fontSize:13}}>people</span></div>
          <button className="lbtn" style={{marginLeft:"auto",color:"var(--muted)"}} onClick={onLogout}>Log out</button>
        </div>
      </div>

      {/* feed */}
      <div style={{padding:"14px 18px 44px",display:"flex",flexDirection:"column",gap:18}}>
        {shown.length===0 && <div style={{textAlign:"center",padding:"60px 20px",color:"var(--muted)"}}>Nothing here yet. Tap <b style={{color:"var(--paper)"}}>Invite</b>, share the link, and photos land here live.</div>}
        {shown.map(p=>(
          <div key={p.id} className={p.id===freshId?"rise":""}>
            <div className="photo" onClick={()=>openPhoto(p)} style={{cursor:"pointer"}}>
              {thumbs[p.id] && <img className={p.id===freshId?"develop":""} src={thumbs[p.id]} alt=""/>}
            </div>
            {!evValid && <div style={{display:"flex",flexWrap:"wrap",gap:12,marginTop:9}}>
              {p.eventIds.map(id=>{ const e=findEv(id); return e?(<span key={id} style={{display:"inline-flex",alignItems:"center",gap:5,fontSize:11,fontWeight:600,color:e.color}}><span style={{width:7,height:7,borderRadius:"50%",background:e.color}}/>{e.name}</span>):null; })}
            </div>}
            {p.caption && <div style={{fontSize:15,marginTop:8,lineHeight:1.4}}>{p.caption}</div>}
            <div style={{fontSize:12.5,color:"var(--muted)",marginTop:5}}>
              <span style={{color:"var(--amber)",fontWeight:600}}>{p.guest_name}</span> · {timeAgo(p.created_at)}
            </div>
          </div>
        ))}
      </div>

      {panel==="manage" && <ManagePanel folders={folders} events={events} reload={loadAll} onClose={()=>setPanel(null)}/>}
      {panel==="invite" && <InvitePanel events={events} reload={loadAll} onClose={()=>setPanel(null)}/>}
      {panel==="hosts" && <HostsPanel myEmail={session.user.email} onClose={()=>setPanel(null)}/>}
      {viewer && <Viewer v={viewer} onDelete={deletePhoto} onClose={()=>setViewer(null)}/>}
    </div></div>
  );
}

function timeAgo(ts){
  const s = Math.floor((Date.now()-new Date(ts).getTime())/1000);
  if(s<60) return "just now";
  const m=Math.floor(s/60); if(m<60) return m+"m ago";
  const h=Math.floor(m/60); if(h<24) return h+"h ago";
  return Math.floor(h/24)+"d ago";
}

function Viewer({ v, onDelete, onClose }){
  const [confirm,setConfirm]=useState(false);
  return (
    <div className="modal-bg" onClick={onClose}>
      <div onClick={e=>e.stopPropagation()} style={{width:"100%",maxWidth:440}}>
        <img src={v.url} alt="" style={{width:"100%",borderRadius:14,maxHeight:"64vh",objectFit:"contain",background:"#000"}}/>
        {v.photo.caption && <div style={{color:"var(--paper)",marginTop:12,fontSize:15}}>{v.photo.caption}</div>}
        <div style={{color:"var(--muted)",fontSize:13,marginTop:6}}><span style={{color:"var(--amber)",fontWeight:600}}>{v.photo.guest_name}</span> · {timeAgo(v.photo.created_at)}</div>
        <div className="row" style={{marginTop:14}}>
          <a className="btn btn-ghost" href={v.url} target="_blank" rel="noopener" style={{textAlign:"center",textDecoration:"none",lineHeight:"1.4"}}>Save / open</a>
          {confirm
            ? <button className="btn" style={{background:"#C23B26",color:"#fff"}} onClick={()=>onDelete(v.photo)}>Tap again to delete</button>
            : <button className="btn btn-ghost" onClick={()=>setConfirm(true)}>Delete</button>}
        </div>
        <button className="btn btn-dark" style={{marginTop:10}} onClick={onClose}>Close</button>
      </div>
    </div>
  );
}

const selStyle = { background:"#fff", color:"var(--ink)", border:"1px solid var(--lineLight)", borderRadius:8, padding:"7px 9px", fontSize:13, fontWeight:600 };

function ManagePanel({ folders, events, reload, onClose }){
  const [tab,setTab]=useState("events");
  const [evName,setEvName]=useState(""); const [evFolder,setEvFolder]=useState("");
  const [foName,setFoName]=useState("");
  async function createEvent(){ if(!evName.trim())return; const color=COLORS[events.length%COLORS.length];
    await sb.from("events").insert({ name:evName.trim(), color, folder_id:evFolder||null }); setEvName(""); reload(); }
  async function setStatus(id,s){ await sb.from("events").update({status:s}).eq("id",id); reload(); }
  async function move(id,fid){ await sb.from("events").update({folder_id:fid||null}).eq("id",id); reload(); }
  async function createFolder(){ if(!foName.trim())return; await sb.from("folders").insert({name:foName.trim()}); setFoName(""); reload(); }
  async function delFolder(id){ await sb.from("events").update({folder_id:null}).eq("folder_id",id); await sb.from("folders").delete().eq("id",id); reload(); }
  return (
    <div className="modal-bg" onClick={onClose}><div className="modal" onClick={e=>e.stopPropagation()}>
      <div className="h1" style={{fontSize:20,marginBottom:12}}>Organize</div>
      <div className="row" style={{background:"var(--lineLight)",borderRadius:999,padding:3,marginBottom:14}}>
        {[["events","Events"],["folders","Folders"]].map(([k,l])=>(
          <button key={k} onClick={()=>setTab(k)} style={{flex:1,padding:8,border:"none",borderRadius:999,fontWeight:700,fontSize:13.5,cursor:"pointer",background:tab===k?"#fff":"transparent",color:tab===k?"var(--ink)":"var(--muted)"}}>{l}</button>))}
      </div>
      {tab==="events" ? (<>
        <div className="row" style={{marginBottom:6}}>
          <input style={{...selStyle,flex:1,minWidth:0}} value={evName} onChange={e=>setEvName(e.target.value)} placeholder="New event name"/>
          <select style={selStyle} value={evFolder} onChange={e=>setEvFolder(e.target.value)}>
            <option value="">Unfiled</option>{folders.map(f=><option key={f.id} value={f.id}>{f.name}</option>)}</select>
        </div>
        <button className="btn btn-dark" style={{padding:10,marginBottom:14,opacity:evName.trim()?1:.5}} onClick={createEvent}>Create event</button>
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {events.map(e=>{ const ended=e.status==="ended"; return (
            <div key={e.id} style={{padding:"10px 11px",borderRadius:12,background:"#fff",border:"1px solid var(--lineLight)"}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:8}}>
                <div style={{display:"flex",alignItems:"center",gap:8,minWidth:0}}>
                  <span style={{width:9,height:9,borderRadius:"50%",background:ended?"var(--muted)":e.color}}/>
                  <span style={{fontWeight:600,fontSize:14,color:ended?"var(--muted)":"var(--ink)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{e.name}{ended?" · ended":""}</span>
                </div>
                {ended? <button className="lbtn" style={{color:"var(--ink)"}} onClick={()=>setStatus(e.id,"live")}>Reopen</button>
                      : <button className="lbtn" style={{color:"#C23B26"}} onClick={()=>setStatus(e.id,"ended")}>End</button>}
              </div>
              <div style={{display:"flex",alignItems:"center",gap:7,marginTop:9}}>
                <span style={{fontSize:12,color:"var(--muted)"}}>Folder</span>
                <select style={{...selStyle,flex:1}} value={e.folder_id||""} onChange={ev=>move(e.id,ev.target.value)}>
                  <option value="">Unfiled</option>{folders.map(f=><option key={f.id} value={f.id}>{f.name}</option>)}</select>
              </div>
            </div>); })}
        </div>
      </>) : (<>
        <div className="row" style={{marginBottom:14}}>
          <input style={{...selStyle,flex:1,minWidth:0}} value={foName} onChange={e=>setFoName(e.target.value)} placeholder="New folder name"/>
          <button className="btn btn-dark" style={{width:"auto",padding:"0 16px",opacity:foName.trim()?1:.5}} onClick={createFolder}>Add</button>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {folders.map(f=>{ const c=events.filter(e=>e.folder_id===f.id).length; return (
            <div key={f.id} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"11px 12px",borderRadius:12,background:"#fff",border:"1px solid var(--lineLight)"}}>
              <span style={{fontWeight:600,fontSize:14}}>{f.name} <span style={{color:"var(--muted)",fontWeight:500}}>· {c} event{c===1?"":"s"}</span></span>
              <button className="lbtn" style={{color:"#C23B26"}} onClick={()=>delFolder(f.id)}>Delete</button>
            </div>); })}
        </div>
        <div style={{fontSize:12,color:"var(--muted)",marginTop:12}}>Deleting a folder keeps its events — they move to Unfiled.</div>
      </>)}
      <button className="btn btn-dark" style={{marginTop:14}} onClick={onClose}>Done</button>
    </div></div>
  );
}

function InvitePanel({ events, reload, onClose }){
  const live = events.filter(e=>e.status!=="ended");
  const [id,setId]=useState(live[0]?.id);
  const [copied,setCopied]=useState(false);
  const e = live.find(x=>x.id===id)||live[0];
  if(!e) return (<div className="modal-bg" onClick={onClose}><div className="modal" onClick={ev=>ev.stopPropagation()}>
    <div style={{color:"var(--muted)",textAlign:"center"}}>No active events to invite to. Create one in Manage.</div>
    <button className="btn btn-dark" style={{marginTop:14}} onClick={onClose}>Done</button></div></div>);
  const link = location.origin + "/?e=" + e.invite_token;
  const qr = "https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=" + encodeURIComponent(link);
  function copy(){ navigator.clipboard?.writeText(link).catch(()=>{}); setCopied(true); setTimeout(()=>setCopied(false),1600); }
  async function reset(){ const t=crypto.randomUUID().replace(/-/g,""); await sb.from("events").update({invite_token:t}).eq("id",e.id); reload(); }
  return (
    <div className="modal-bg" onClick={onClose}><div className="modal" onClick={ev=>ev.stopPropagation()}>
      <div className="h1" style={{fontSize:20,textAlign:"center"}}>Invite to an event</div>
      <div style={{display:"flex",flexWrap:"wrap",gap:6,justifyContent:"center",margin:"12px 0 16px",maxHeight:96,overflowY:"auto"}}>
        {live.map(ev=>(<button key={ev.id} onClick={()=>setId(ev.id)} style={{padding:"6px 11px",borderRadius:999,cursor:"pointer",fontWeight:600,fontSize:12.5,border:"1.5px solid "+(id===ev.id?ev.color:"var(--lineLight)"),background:id===ev.id?ev.color+"1A":"transparent",color:id===ev.id?"var(--ink)":"var(--muted)"}}>{ev.name}</button>))}
      </div>
      <div style={{display:"flex",justifyContent:"center",marginBottom:14}}><img src={qr} alt="QR" width="160" height="160" style={{borderRadius:10,background:"#fff",padding:6}}/></div>
      <button onClick={copy} style={{width:"100%",display:"flex",justifyContent:"space-between",gap:10,fontSize:14,fontWeight:600,color:"var(--ink)",background:"var(--lineLight)",borderRadius:10,padding:"11px 13px",border:"none",cursor:"pointer"}}>
        <span style={{wordBreak:"break-all",textAlign:"left"}}>{link}</span><span style={{color:copied?"#1A9E6B":"var(--muted)",fontWeight:700}}>{copied?"Copied ✓":"Copy"}</span>
      </button>
      <button className="lbtn" style={{color:"#C23B26",display:"block",margin:"12px auto 0"}} onClick={reset}>Reset this link (old one stops working)</button>
      <button className="btn btn-dark" style={{marginTop:14}} onClick={onClose}>Done</button>
    </div></div>
  );
}

function HostsPanel({ myEmail, onClose }){
  const [list,setList]=useState([]); const [email,setEmail]=useState("");
  async function load(){ const {data}=await sb.from("allowed_hosts").select("*").order("added_at"); setList(data||[]); }
  useEffect(()=>{ load(); },[]);
  async function add(){ const e=email.trim().toLowerCase(); if(!/\S+@\S+\.\S+/.test(e))return; await sb.from("allowed_hosts").insert({email:e}); setEmail(""); load(); }
  async function rm(e){ await sb.from("allowed_hosts").delete().eq("email",e); load(); }
  return (
    <div className="modal-bg" onClick={onClose}><div className="modal" onClick={ev=>ev.stopPropagation()}>
      <div className="h1" style={{fontSize:20,marginBottom:4}}>Co-hosts</div>
      <div style={{fontSize:12,color:"var(--muted)",marginBottom:14}}>Anyone added here can log in and see every event.</div>
      <div className="row" style={{marginBottom:14}}>
        <input style={{...selStyle,flex:1,minWidth:0}} value={email} onChange={e=>setEmail(e.target.value)} placeholder="cohost@email.com" inputMode="email" autoCapitalize="off"/>
        <button className="btn btn-dark" style={{width:"auto",padding:"0 16px",opacity:email.trim()?1:.5}} onClick={add}>Add</button>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:8}}>
        {list.map(h=>(
          <div key={h.email} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"11px 12px",borderRadius:12,background:"#fff",border:"1px solid var(--lineLight)"}}>
            <span style={{fontWeight:600,fontSize:13.5,overflow:"hidden",textOverflow:"ellipsis"}}>{h.email}{h.email===myEmail?" (you)":""}</span>
            {h.email!==myEmail && <button className="lbtn" style={{color:"#C23B26"}} onClick={()=>rm(h.email)}>Remove</button>}
          </div>))}
      </div>
      <button className="btn btn-dark" style={{marginTop:14}} onClick={onClose}>Done</button>
    </div></div>
  );
}

function HostApp(){
  const [session,setSession]=useState(undefined);
  const [isHost,setIsHost]=useState(null);
  useEffect(()=>{
    sb.auth.getSession().then(({data})=>setSession(data.session));
    const { data:sub } = sb.auth.onAuthStateChange((_e,s)=>setSession(s));
    return ()=>sub.subscription.unsubscribe();
  },[]);
  useEffect(()=>{
    if(session){ sb.rpc("is_host").then(({data})=>setIsHost(!!data)); } else setIsHost(null);
  },[session]);
  async function logout(){ await sb.auth.signOut(); location.href="/?host=1"; }

  if(session===undefined) return <div className="wrap"><div className="card" style={{display:"flex",alignItems:"center",justifyContent:"center"}}><span className="spin"></span></div></div>;
  if(!session) return <Login/>;
  if(isHost===null) return <div className="wrap"><div className="card" style={{display:"flex",alignItems:"center",justifyContent:"center"}}><span className="spin"></span></div></div>;
  if(!isHost) return (<div className="wrap"><div className="card" style={{padding:"44px 22px",display:"flex",flexDirection:"column",justifyContent:"center",minHeight:"100vh",textAlign:"center"}}>
    <div className="h1" style={{fontSize:22}}>Not a host yet</div>
    <div style={{color:"var(--muted)",marginTop:10,lineHeight:1.5}}>This email isn't on the host list. Ask an existing host to add you in the Co-hosts panel.</div>
    <button className="btn btn-ghost" style={{marginTop:20}} onClick={logout}>Log out</button>
  </div></div>);
  return <Dashboard session={session} onLogout={logout}/>;
}

function Root(){
  const params = new URLSearchParams(location.search);
  const tokenParam = params.get("e");
  const wantHost = params.get("host");
  const isGuest = tokenParam || (!wantHost && LS.tokens().length>0);
  return isGuest ? <GuestApp tokenParam={tokenParam}/> : <HostApp/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<Root/>);

if("serviceWorker" in navigator){ window.addEventListener("load",()=>navigator.serviceWorker.register("/sw.js").catch(()=>{})); }

</script>
